<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stokiply - Every Order, In Check</title>
    <meta name="theme-color" content="#0A0D14" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Stokiply" />
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/DannyYo696/svillage/b29f8865411712b4c9146e791825c75d2ba7cbe4/cl%20icon.png" />
    <link rel="manifest" href="/manifest.json" />
    <script>
      // Register Service Worker
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').then(registration => {
            console.log('SW registered: ', registration);
          }).catch(registrationError => {
            console.log('SW registration failed: ', registrationError);
          });
        });
      }

      // Safety: detect if we need to purge cache
      if (window.location.search.includes('purge=true')) {
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(registrations => {
            for (let registration of registrations) {
              registration.unregister();
            }
            window.location.href = window.location.pathname;
          });
        }
      }

      // Fix for "Cannot set property fetch of #<Window> which has only a getter"
      // This protects the native fetch from being overwritten by polyfills.
      (function() {
        const originalFetch = window.fetch;
        if (originalFetch) {
          try {
            Object.defineProperty(window, 'fetch', {
              get: function() { return originalFetch; },
              set: function(v) { console.warn('Blocked attempt to overwrite window.fetch'); },
              configurable: true
            });
          } catch (e) {}
        }
      })();
    </script>
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/DannyYo696/svillage/b29f8865411712b4c9146e791825c75d2ba7cbe4/cl%20icon.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
